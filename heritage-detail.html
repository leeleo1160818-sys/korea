<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국의 빛-한국의 유산</title>
  <link rel="icon" href="img/favicon.png" type="image/png" />
  <!-- Link Swiper's CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
  <!-- fontawesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <!-- AOS css-->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/heritage-detail.css" />
  <link rel="stylesheet" href="css/common.css" />
  <!-- jquery -->
  <script src="js/jquery-4.0.0.js"></script>
  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  <!-- Isotope JS  -->
  <script src="js/isotope.pkgd.min.js"></script>
  <!-- imagesLoaded  -->
  <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
  <!--  Masonry -->
  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
  <!-- gsap -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>
  <div id="wrap">
    <header>
      <div class="inner">
        <div class="header-top">
          <h1 class="logo">
            <a href="index.html"><img src="img/logo1.png" alt="홈으로" /></a>
          </h1>
          <ul class="gnb">
            <li><a href="">한국소개</a></li>
            <li><a href="">한국의 유산</a></li>
            <li><a href="food-index.html">대표음식</a></li>
            <li><a href="">전통문화</a></li>
            <li><a href="">K-Culture</a></li>
          </ul>

          <div class="util">
            <div class="lang">
              <a href="#">Language <span><i class="fa-solid fa-angle-down"></i></span></a>
              <ul class="lang-list">
                <li><a href="#">English</a></li>
                <li><a href="#">日本語</a></li>
                <li><a href="#">中文</a></li>
              </ul>
            </div>
            <div class="color">
              <button data-theme="light"></button>
              <button data-theme="dark"></button>
              <button data-theme="mix"></button>
            </div>
          </div>
        </div>
      </div>
    </header>
    <!-- 헤더 -->
    <section class="heritage-detail">

      <div class="inner">

        <!-- 상단 이미지 -->
        <div class="hero">
          <img id="detail-image">
        </div>

        <!-- 제목 -->
        <div class="title-area">
          <h1 id="detail-name"></h1>
          <p id="detail-tagline"></p>
          <p id="detail-intro"></p>
        </div>


        <div class="info-grid">
          <!-- 유산 소개 -->
          <div class="box">
            <h3>유산 소개</h3>
            <p id="detail-intro2"></p>
          </div>

          <!-- 역사 -->
          <div class="box">
            <h3>역사와 배경</h3>
            <p id="detail-history"></p>
          </div>

          <!-- 갤러리 -->
          <div class="box gallery">
            <h3>주요 사진</h3>
            <div class="gallery-grid">
              <img id="g1">
              <img id="g2">
              <img id="g3">
              <img id="g4">
            </div>
          </div>

          <div class="etc">
            <!-- 체험 -->
            <div class="box">
              <h3>관련 문화 / 체험</h3>
              <ul id="experience"></ul>
            </div>
            <!-- 위치 -->
            <div class="box">
              <h3>위치 / 지역</h3>
              <p id="location"></p>
            </div>
            <!-- 버튼 영역 -->
            <div class="btn-area">
              <button class="return">목록으로 가기</button>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- 섹션완료 -->
    <footer>
      <div class="inner">
        <h2>Footer</h2>
      </div>
    </footer>
  </div>

  <script src="js/heritageDetail-script.js"></script>
</body>

</html>
