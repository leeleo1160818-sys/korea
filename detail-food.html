<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국의 빛</title>
    <link rel="icon" href="img/favicon.png" type="image/png" />
    <!-- Link Swiper's CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <!-- AOS css-->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/detail-food.css" />
    <!-- jquery -->
    <script src="js/jquery-4.0.0.js"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <!-- Isotope JS  -->
    <script src="js/isotope.pkgd.min.js"></script>
    <!-- gsap -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  </head>

  <body>
    <div id="wrap">
      <header>
        <div class="inner">
          <div class="header-top">
            <h1 class="logo"><img src="img/logo1.png" alt="홈으로" /></h1>
            <ul class="gnb">
              <li><a href="">한국소개</a></li>
              <li><a href="">한국의 유산</a></li>
              <li><a href="food-index.html">대표음식</a></li>
              <li><a href="">전통문화</a></li>
              <li><a href="">K-Culture</a></li>
            </ul>

            <div class="util">
              <select name="언어" id="">
                KOREA
              </select>
            </div>
          </div>
        </div>
      </header>
      <!-- 헤더 -->
      <section id="detail-food">
        <div class="inner">
          <div class="detail-grid">
            <div class="detail-img">
              <img id="foodImage" />
            </div>

            <div>
              <h2 class="detail-title" id="foodName"></h2>

              <p class="detail-tagline" id="foodTagline"></p>

              <div class="info-grid">
                <div class="info-box">
                  <h3>음식 소개</h3>
                  <p id="foodIntro"></p>
                </div>

                <div class="info-box">
                  <h3>이야기와 역사</h3>
                  <p id="foodHistory"></p>
                </div>

                <div class="info-box">
                  <h3>주요 재료</h3>
                  <ul id="ingredientList"></ul>
                </div>

                <div class="info-box">
                  <h3>관련 지역 / 문화</h3>
                  <ul id="regionList"></ul>
                </div>

                <div class="info-box">
                  <h3>곁들이는 음식</h3>
                  <ul id="pairingList"></ul>
                </div>

                <div class="btn-area">
                  <button class="return">목록으로 가기</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <footer>
        <div class="inner">
          <h2>Footer</h2>
        </div>
      </footer>
    </div>

    <!-- 마우스커서 -->
    <div class="cursor-light"></div>

    <div class="trail"></div>
    <div class="trail"></div>
    <div class="trail"></div>
    <div class="trail"></div>
    <div class="trail"></div>
    <div class="trail"></div>
    <div class="trail"></div>

    <script src="js/detail-food.js"></script>
  </body>
</html>
