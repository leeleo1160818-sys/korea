<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국의 빛</title>
    <link rel="icon" href="img/favicon.png" type="image/png" />
    <!-- Link Swiper's CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <!-- AOS css-->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/food-index.css" />
    <!-- jquery -->
    <script src="js/jquery-4.0.0.js"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <!-- Isotope JS  -->
    <script src="js/isotope.pkgd.min.js"></script>
    <!-- gsap -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  </head>

  <body>
    <div id="wrap">
      <header>
        <div class="inner">
          <div class="header-top">
            <h1 class="logo">
              <a href="index.html"><img src="img/logo1.png" alt="홈으로" /></a>
            </h1>
            <ul class="gnb">
              <li><a href="">한국소개</a></li>
              <li><a href="">한국의 유산</a></li>
              <li><a href="food-index.html">대표음식</a></li>
              <li><a href="">전통문화</a></li>
              <li><a href="">K-Culture</a></li>
            </ul>

            <div class="util">
              <select name="언어" id="">
                KOREA
              </select>
            </div>
          </div>
        </div>
      </header>
      <!-- 헤더 -->
      <section id="food">
        <div class="inner">
          <h2>대표 음식</h2>

          <!-- 검색 -->
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="음식 검색" />
          </div>

          <!-- 탭 -->
          <ul class="tab">
            <li data-filter="all" class="on">전체</li>
            <li data-filter="궁중음식">궁중음식</li>
            <li data-filter="K-BBQ">K-BBQ</li>
            <li data-filter="소울푸드">소울푸드</li>
            <li data-filter="길거리음식">길거리음식</li>
            <li data-filter="전통주">전통주</li>
          </ul>

          <!-- 리스트 -->
          <div class="food-list"></div>

          <div class="btn-area">
            <button class="more-btn">더보기</button>
          </div>
        </div>
      </section>
      <footer>
        <div class="inner">
          <h2>Footer</h2>
        </div>
      </footer>
    </div>

    <!-- 마우스커서 -->
    <div class="cursor-light"></div>

    <div class="trail"></div>
    <div class="trail"></div>
    <div class="trail"></div>
    <div class="trail"></div>
